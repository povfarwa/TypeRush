<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TypeResh</title>
</head>
<body>
  
  
    <div class="container">
      <header class="header">
        <div class="logo">
          <span class="logo-icon">&gt;_</span>
          <span class="logo-name">Type<em>Rush</em></span>
        </div>
        <span class="header-tag">speed test</span>
      </header>
        </div>
    </div>
  
    <div class="live-starts">
      <div class="stat-block">
        <span class="stat-value" id="live-wpm">0</span>
        <span class="stat-label">wpm</span>
      </div>
    </div>

    <div class="time-wrap">
      <svg>
        <circle class="ring-bg" cx="45" cy="45" r="38" />
        <circle class="ring-arc" cx="45" cy="45" r="38" id="timer-arc" />
      </svg>
      <div class="timer-number" id="timer-display">60</div>
    </div>

</body>
</html>
